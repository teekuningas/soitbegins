name: Build and Publish

on:
  push:
    tags:
      - '*'
    branches:
      - dockerize-release

jobs:
  server_build_and_publish:
    name: Server Build and Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Extract tag name
      shell: bash
      run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Setup Nix
      uses: cachix/install-nix-action@v22
      with:
        extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      run: |
        cd server
        nix build .#dockerImage
        docker load < result
        docker tag soitbegins-server:latest ghcr.io/${{ github.repository }}/soitbegins-server:${{ env.IMAGE_TAG }}
        docker push ghcr.io/${{ github.repository }}/soitbegins-server:${{ env.IMAGE_TAG }}

  simulation_build_and_publish:
    name: Simulation Microservice Build and Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Extract tag name
      shell: bash
      run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Setup Nix
      uses: cachix/install-nix-action@v22
      with:
        extra_nix_config: "system-features = nixos-test benchmark big-parallel kvm"

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      run: |
        cd simulation
        nix build .#dockerImage
        docker load < result
        docker tag soitbegins-simulation:latest ghcr.io/${{ github.repository }}/soitbegins-simulation:${{ env.IMAGE_TAG }}
        docker push ghcr.io/${{ github.repository }}/soitbegins-simulation:${{ env.IMAGE_TAG }}

  frontend_build_and_publish:
    name: Frontend Build and Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Extract tag name
      shell: bash
      run: echo "IMAGE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v1
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Copy shared assets
      run: cp shared/output/elevation_*.png frontend/static/

    - name: Build and push
      run: |
        cd frontend
        docker build -f Containerfile -t ghcr.io/${{ github.repository }}/soitbegins-frontend:${{ env.IMAGE_TAG }} .
        docker push ghcr.io/${{ github.repository }}/soitbegins-frontend:${{ env.IMAGE_TAG }}
